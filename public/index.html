<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokebook</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Jokebook</h1>

    <section>
        <h2>Random Joke</h2>
        <div id="randomOutput"></div>
        <button id="randBtn">Show Another Random Joke</button>
    </section>

    <section>
        <h2>Categories</h2>
        <button id="cateBtn">Load Categories</button>
        <ul id="cateList"></ul>
        <input id="categoryInput" placeholder="Enter category name">
        <button id="searchBtn">Search Category</button>
    </section>

    <section>
        <h2>Add a Joke</h2>
        <input id="addCategory" placeholder="Category">
        <input id="setup" placeholder="Setup">
        <input id="delivery" placeholder="Delivery">
        <button id="addBtn">Add Joke</button>
    </section>

    <section>
        <h2>Jokes Output</h2>
        <div id="output"></div>
    </section>
</body>
</html>
